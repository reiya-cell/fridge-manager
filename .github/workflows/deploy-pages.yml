name: Deploy HTTPS site
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript syntax
        run: node --check app.js && node --check service-worker.js
      - name: Run regression simulations
        run: node tests/logic-simulations.mjs
      - name: Render and verify category images
        run: |
          python3 -m http.server 4173 >/tmp/fridge-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 2
          CHROME=$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser)
          echo "Using browser: $CHROME"
          "$CHROME" --headless=new --no-sandbox --disable-gpu --virtual-time-budget=8000 --dump-dom http://127.0.0.1:4173/tests/image-smoke.html > /tmp/image-smoke.html
          cat /tmp/image-smoke.html
          grep 'data-image-test="pass"' /tmp/image-smoke.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
