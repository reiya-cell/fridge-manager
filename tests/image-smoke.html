<!doctype html><html lang="ja"><meta charset="utf-8"><title>Image smoke test</title>
<body><div id="result" data-image-test="running">確認中</div><iframe id="app" src="../index.html" style="position:absolute;left:-10000px;width:390px;height:844px"></iframe>
<script>
const frame=document.querySelector('#app'),result=document.querySelector('#result');
frame.addEventListener('load',async()=>{await new Promise(resolve=>setTimeout(resolve,1500));const images=[...frame.contentDocument.querySelectorAll('.food-pictogram,.category-pictogram')];await Promise.allSettled(images.map(image=>image.decode?.()));const loaded=images.filter(image=>image.complete&&image.naturalWidth>0);const pass=images.length>=12&&loaded.length===images.length;result.dataset.imageTest=pass?'pass':'fail';result.textContent=`${loaded.length}/${images.length} images loaded`;document.body.dataset.complete='true'},{once:true});
</script></body></html>
