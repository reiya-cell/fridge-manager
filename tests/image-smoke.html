<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<title>Image smoke test</title>
<body>
<div id="result" data-image-test="running">確認中</div>
<div id="images"></div>
<script>
const files=['meat.png','fish.jpg','vegetable.png','fruit.jpg','dairy.png','daily.png','seasoning.png','frozen.png'];
const images=files.map(file=>{const image=new Image(96,96);image.src=`../assets/irasutoya/${file}`;image.alt=file;document.querySelector('#images').append(image);return image});
Promise.all(images.map(image=>image.decode())).then(()=>{
  const loaded=images.filter(image=>image.complete&&image.naturalWidth>0);
  const result=document.querySelector('#result');
  result.dataset.imageTest=loaded.length===files.length?'pass':'fail';
  result.textContent=`${loaded.length}/${files.length} images loaded`;
}).catch(error=>{const result=document.querySelector('#result');result.dataset.imageTest='fail';result.textContent=error.message});
</script>
</body>
</html>
