<!doctype html><html lang="ja"><meta charset="utf-8"><title>UI simulations</title>
<body><h1>UI simulation results</h1><ol id="results"></ol><iframe id="app" src="../index.html" hidden></iframe>
<script>
const frame=document.querySelector('#app'),results=document.querySelector('#results');
const wait=ms=>new Promise(resolve=>setTimeout(resolve,ms));
const loaded=()=>new Promise(resolve=>frame.addEventListener('load',resolve,{once:true}));
const report=(name,ok,detail='')=>results.insertAdjacentHTML('beforeend',`<li data-result="${ok?'pass':'fail'}">${name}: ${ok?'PASS':'FAIL'} ${detail}</li>`);
async function fresh(items=[]){frame.contentWindow.localStorage.setItem('fridge-items',JSON.stringify(items));const ready=loaded();frame.contentWindow.location.reload();await ready;await wait(150);return frame.contentDocument}
async function run(){
  try{let d=await fresh();let w=frame.contentWindow;const name=d.querySelector('#itemName');name.value='人参';name.dispatchEvent(new Event('input',{bubbles:true}));d.querySelector('.form-step[data-step="1"] .next').click();const volume=d.querySelector('#volume').value;d.querySelector('.form-step[data-step="2"] .next').click();d.querySelector('input[name="location"][value="vegetable"]').click();d.querySelector('#itemForm').requestSubmit();await wait(100);report('1 手入力・容量・野菜室登録',volume==='0.5'&&d.querySelector('#inventoryList').textContent.includes('人参'))}catch(e){report('1 手入力・容量・野菜室登録',false,e.message)}
  try{let d=await fresh([{id:'f1',name:'冷凍食品',category:'その他',quantity:'1',unit:'袋',volumeLiters:1,storage:'冷凍',location:'freezer',purchased:'2026-06-20',expiry:'2030-01-01'},{id:'v1',name:'キャベツ',category:'野菜',quantity:'1',unit:'個',volumeLiters:5,storage:'冷蔵',location:'vegetable',purchased:'2026-06-20',expiry:'2030-01-01'}]);d.querySelector('.nav[data-view="inventory"]').click();d.querySelector('.compartment[data-map-location="freezer"]').click();const text=d.querySelector('#inventoryList').textContent;report('2 冷凍室フィルター・容量表示',text.includes('冷凍食品')&&!text.includes('キャベツ')&&d.querySelector('[data-map-items="freezer"]').textContent.includes('残り'))}catch(e){report('2 冷凍室フィルター・容量表示',false,e.message)}
  try{let d=await fresh();d.querySelector('#receiptButton').click();await wait(1200);const dialog=d.querySelector('#cameraDialog'),status=d.querySelector('#cameraStatus').textContent;report('3 カメラ画面・例外処理',dialog.open&&(status.includes('枠内')||status.includes('許可')||status.includes('起動できません')))}catch(e){report('3 カメラ画面・例外処理',false,e.message)}
  document.body.dataset.complete='true';
}
frame.addEventListener('load',run,{once:true});
</script></body></html>
